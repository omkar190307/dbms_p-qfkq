<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Speakers – EventPro</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .speaker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 40px 5%; }
    .speaker-card { background: var(--bg-700); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); overflow: hidden; text-align: center; padding: 40px 20px; transition: var(--transition); }
    .speaker-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-glow); }
    .speaker-avatar-lg { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; color: #fff; box-shadow: 0 8px 24px rgba(108,61,229,0.3); }
    .speaker-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .speaker-bio { color: var(--text-300); font-size: 0.9rem; line-height: 1.6; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-logo">Event<span>Pro</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="events.html">Events</a></li>
    <li><a href="speakers.html" class="active">Speakers</a></li>
    <li><a href="venues.html">Venues</a></li>
  </ul>
  <div class="nav-actions">
    <span class="nav-user-name" id="navUserName" style="display:none"></span>
    <a href="login.html" class="btn btn-outline btn-sm" id="navLoginBtn">Log In</a>
    <a href="register.html" class="btn btn-primary btn-sm" id="navRegisterBtn">Sign Up</a>
    <a href="dashboard.html" class="btn btn-primary btn-sm" id="navDashBtn" style="display:none">Dashboard</a>
    <button class="btn btn-outline btn-sm" id="navLogoutBtn" style="display:none" onclick="logout()">Logout</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</nav>

<div class="page-wrapper">
  <div class="page-hero">
    <div class="section-label">🎤 Our Experts</div>
    <h1 class="page-hero-title">Meet the <span>Speakers</span></h1>
    <p class="page-hero-desc">Industry leaders, innovators, and creators sharing their knowledge and experiences.</p>
  </div>

  <div class="speaker-grid" id="speakerList">
    <div style="grid-column:1/-1;text-align:center;"><div class="spinner"></div></div>
  </div>
</div>

<footer class="footer" style="padding: 40px 5%; text-align: center; border-top: 1px solid var(--glass-border);">
  <p style="color:var(--text-400); font-size:0.9rem;">© 2026 EventPro. All rights reserved.</p>
</footer>

<div id="toast-container"></div>
<script src="../js/utils.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const list = document.getElementById('speakerList');
    try {
      const speakers = await apiFetch('/speakers');
      if (!speakers.length) { list.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-300);">No speakers found.</p>'; return; }
      list.innerHTML = speakers.map(s => `
        <div class="speaker-card animate-fadeInUp">
          <div class="speaker-avatar-lg">${s.Name.charAt(0)}</div>
          <h3 class="speaker-name">${s.Name}</h3>
          <p class="speaker-bio">${s.Bio || 'Expert speaker at EventPro.'}</p>
        </div>
      `).join('');
    } catch {
      list.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-300);">Could not load speakers. Make sure backend is running.</p>';
    }
  });
</script>
</body>
</html>
