<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Venues – EventPro</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .venue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding: 40px 5%; }
    .venue-card { background: var(--bg-700); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition); }
    .venue-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-glow); }
    .venue-img { height: 160px; background: linear-gradient(135deg, var(--bg-600), var(--bg-500)); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .venue-body { padding: 24px; }
    .venue-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; }
    .venue-detail { display: flex; align-items: flex-start; gap: 8px; color: var(--text-300); font-size: 0.85rem; margin-bottom: 8px; }
    .venue-detail .icon { color: var(--primary-light); width: 16px; flex-shrink: 0; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-logo">Event<span>Pro</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="events.html">Events</a></li>
    <li><a href="speakers.html">Speakers</a></li>
    <li><a href="venues.html" class="active">Venues</a></li>
  </ul>
  <div class="nav-actions">
    <span class="nav-user-name" id="navUserName" style="display:none"></span>
    <a href="login.html" class="btn btn-outline btn-sm" id="navLoginBtn">Log In</a>
    <a href="register.html" class="btn btn-primary btn-sm" id="navRegisterBtn">Sign Up</a>
    <a href="dashboard.html" class="btn btn-primary btn-sm" id="navDashBtn" style="display:none">Dashboard</a>
    <button class="btn btn-outline btn-sm" id="navLogoutBtn" style="display:none" onclick="logout()">Logout</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
</nav>

<div class="page-wrapper">
  <div class="page-hero">
    <div class="section-label">🏛️ Event Locations</div>
    <h1 class="page-hero-title">Premium <span>Venues</span></h1>
    <p class="page-hero-desc">Discover the best event locations across India with world-class facilities and capacity.</p>
  </div>

  <div class="venue-grid" id="venueList">
    <div style="grid-column:1/-1;text-align:center;"><div class="spinner"></div></div>
  </div>
</div>

<footer class="footer" style="padding: 40px 5%; text-align: center; border-top: 1px solid var(--glass-border);">
  <p style="color:var(--text-400); font-size:0.9rem;">© 2026 EventPro. All rights reserved.</p>
</footer>

<div id="toast-container"></div>
<script src="../js/utils.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const list = document.getElementById('venueList');
    try {
      const venues = await apiFetch('/venues');
      if (!venues.length) { list.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-300);">No venues found.</p>'; return; }
      list.innerHTML = venues.map(v => `
        <div class="venue-card animate-fadeInUp">
          <div class="venue-img">🏛️</div>
          <div class="venue-body">
            <h3 class="venue-name">${v.Name}</h3>
            <div class="venue-detail"><span class="icon">📍</span> <span>${v.Address}, ${v.City}, ${v.State} - ${v.Zipcode}</span></div>
            <div class="venue-detail"><span class="icon">👥</span> <span>Capacity: ${v.Capacity ? v.Capacity.toLocaleString('en-IN') : 'N/A'}</span></div>
          </div>
        </div>
      `).join('');
    } catch {
      list.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-300);">Could not load venues. Make sure backend is running.</p>';
    }
  });
</script>
</body>
</html>
